name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 下載程式碼
        uses: actions/checkout@v4

      - name: 🐍 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: ☕ 設定 Java 引擎 (Android 必備)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 📦 安裝 Flet
        run: pip install flet

      # 💥 終極修正：利用 yes | 指令，強制自動回答所有 [Y/n] 問題！
      - name: 🚀 編譯 APK
        run: yes | flet build apk

      - name: 📤 上傳 APK 供下載
        uses: actions/upload-artifact@v4
        with:
          name: camera-app-apk
          path: build/apk/**/*.apk
