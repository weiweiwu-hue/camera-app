name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 1. 取得程式碼
        uses: actions/checkout@v4

      - name: ☕ 2. 準備 Java 廚具 (Android 必備)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🐍 3. 設定 Python 雲端環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 4. 安裝打包工具 (Flet)
        run: |
          pip install --upgrade pip
          pip install flet

      - name: 🚀 5. 開始編譯 APK (💥 加入 yes | 自動同意所有提示)
        run: yes | flet build apk

      - name: 📤 6. 產出並上傳 APK 檔案給我們下載
        uses: actions/upload-artifact@v4
        with:
          name: camera-app-apk
          path: build/apk/**/*.apk
