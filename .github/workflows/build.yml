name: Build Android APK

# 觸發條件：只要上傳到 main 分支，或是手動點擊按鈕，就會開始打包
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest # 使用 GitHub 的 Linux 超級電腦

    steps:
      - name: 📥 下載程式碼
        uses: actions/checkout@v4

      - name: 🐍 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # 使用穩定的 Python 版本

      - name: ☕ 設定 Java 引擎 (Android 必備)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 📱 設定 Flutter 引擎 (Flet 的底層)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0' # 鎖定穩定的 Flutter 版本

      - name: 📦 安裝 Flet
        run: pip install flet

      - name: 🚀 編譯 APK (最標準乾淨的打包指令)
        run: flet build apk

      - name: 📤 上傳 APK 供下載
        uses: actions/upload-artifact@v4
        with:
          name: camera-app-apk
          path: build/apk/**/*.apk

    
